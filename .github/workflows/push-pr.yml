name: Build for pushes and PR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 5.0
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        name: BBPC.dll
        path: ./BBPC/Build/Debug/BBPC.dll
    - name: Upload Dependencies
      uses: actions/upload-artifact@v6.0.0
      with:
        name: Dependencies.zip
        path: |
          ./Dlls/MonoMod.Backports.dll
          ./Dlls/MonoMod.ILHelpers.dll
        compression-level: 0
  build-extensions:
    runs-on: windows-latest
    strategy:
      matrix:
        branch: [feat/challengejar, feat/template, feat/ModManager, feat/pluslevelstudio]
        include:
          - branch: feat/challengejar
            name: BBPC.ChallengeJarExtension.dll
          - branch: feat/template
            name: BBPC.ExtensionTemplate.dll
          - branch: feat/ModManager
            name: BBPC.ModManagerExtension.dll
          - branch: feat/pluslevelstudio
            name: BBPC.PlusLevelStudioExtension.dll
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 5.0
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.name }}
          path: ./BBPC/Build/Debug/BBPC.*.dll