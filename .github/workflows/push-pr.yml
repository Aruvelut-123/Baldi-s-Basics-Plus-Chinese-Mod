name: Build for pushes and PR

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '**/*.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '**/*.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 5.0
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Get UTC Date
      id: get-date
      shell: bash
      run: echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
    - name: Save BBPC.dll to cache (fresh every run)
      uses: actions/cache/save@v5
      with:
        path: ./BBPC/Build/Debug/BBPC.dll
        key: bbpc-dll-${{ runner.os }}-${{ steps.get-date.outputs.date }}
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        name: BBPC.dll
        path: ./BBPC/Build/Debug/BBPC.dll
    - name: Upload Dependencies
      uses: actions/upload-artifact@v6.0.0
      with:
        name: Dependencies.zip
        path: |
          ./Dlls/MonoMod.Backports.dll
          ./Dlls/MonoMod.ILHelpers.dll
        compression-level: 0
  build-extensions:
    runs-on: windows-latest
    needs: build
    strategy:
      matrix:
        branch: [feat/challengejar, feat/template, feat/ModManager, feat/pluslevelstudio]
        include:
          - branch: feat/challengejar
            name: BBPC.ChallengeJarExtension.dll
          - branch: feat/template
            name: BBPC.ExtensionTemplate.dll
          - branch: feat/ModManager
            name: BBPC.ModManagerExtension.dll
          - branch: feat/pluslevelstudio
            name: BBPC.PlusLevelStudioExtension.dll
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - name: Get UTC Date
        id: get-date
        shell: bash
        run: echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Restore BBPC.dll from cache
        uses: actions/cache/restore@v5
        with:
          path: ./BBPC/Build/Debug/BBPC.dll
          key: bbpc-dll-${{ runner.os }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            bbpc-dll-${{ runner.os }}-
      - name: Copy BBPC.dll to Dlls folder for extension projects
        run: |
          cp ./BBPC/Build/Debug/BBPC.dll ./Dlls/BBPC.dll
        shell: bash
      - name: Verify BBPC.dll hash matches (source vs copied)
        shell: pwsh   # PowerShell (recommended on Windows runners)
        run: |
          $sourcePath = "./BBPC/Build/Debug/BBPC.dll"
          $copiedPath = "./Dlls/BBPC.dll"

          if (-Not (Test-Path $sourcePath)) {
            Write-Error "Source BBPC.dll not found at $sourcePath"
            exit 1
          }

          if (-Not (Test-Path $copiedPath)) {
            Write-Error "Copied BBPC.dll not found at $copiedPath"
            exit 1
          }

          $sourceHash = (Get-FileHash $sourcePath -Algorithm SHA256).Hash
          $copiedHash = (Get-FileHash $copiedPath -Algorithm SHA256).Hash

          Write-Host "Source BBPC.dll hash: $sourceHash"
          Write-Host "Copied BBPC.dll hash: $copiedHash"

          if ($sourceHash -ne $copiedHash) {
            Write-Error "ERROR: Hash mismatch! The copied BBPC.dll does not match the source."
            Write-Error "This usually means the copy operation failed or the file was corrupted."
            exit 1
          }

          Write-Host "✅ Success: Both BBPC.dll files have matching hashes."
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 5.0
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.name }}
          path: ./BBPC/Build/Debug/BBPC.*.dll