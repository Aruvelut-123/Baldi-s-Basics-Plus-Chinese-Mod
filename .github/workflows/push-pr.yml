name: Build for pushes and PR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 5.0
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Get UTC Date
      id: get-date
      shell: bash
      run: echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
    - name: Save BBPC.dll to cache (fresh every run)
      uses: actions/cache/save@v5
      with:
        path: ./BBPC/Build/Debug/BBPC.dll
        key: bbpc-dll-${{ runner.os }}-${{ steps.get-date.outputs.date }}
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        name: BBPC.dll
        path: ./BBPC/Build/Debug/BBPC.dll
    - name: Upload Dependencies
      uses: actions/upload-artifact@v6.0.0
      with:
        name: Dependencies.zip
        path: |
          ./Dlls/MonoMod.Backports.dll
          ./Dlls/MonoMod.ILHelpers.dll
        compression-level: 0
  build-extensions:
    runs-on: windows-latest
    needs: build
    strategy:
      matrix:
        branch: [feat/challengejar, feat/template, feat/ModManager, feat/pluslevelstudio]
        include:
          - branch: feat/challengejar
            name: BBPC.ChallengeJarExtension.dll
          - branch: feat/template
            name: BBPC.ExtensionTemplate.dll
          - branch: feat/ModManager
            name: BBPC.ModManagerExtension.dll
          - branch: feat/pluslevelstudio
            name: BBPC.PlusLevelStudioExtension.dll
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - name: Get UTC Date
        id: get-date
        shell: bash
        run: echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Restore BBPC.dll from cache
        uses: actions/cache/restore@v5
        with:
          path: ./BBPC/Build/Debug/BBPC.dll
          key: bbpc-dll-${{ runner.os }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            bbpc-dll-${{ runner.os }}-
      - name: Copy BBPC.dll to Dlls folder for extension projects
        run: |
          cp ./BBPC/Build/Debug/BBPC.dll ./Dlls/BBPC.dll
        shell: bash
      - name: Verify copied DLL
        run: dir .\Dlls\BBPC.dll
        shell: cmd
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 5.0
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.name }}
          path: ./BBPC/Build/Debug/BBPC.*.dll